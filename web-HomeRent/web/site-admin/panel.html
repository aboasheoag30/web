<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>مدير الموقع - ايجار ويب</title>
<style>
body{font-family:Tahoma,Arial;background:#f6f7f9;margin:0}
.wrap{max-width:1050px;margin:auto;padding:18px}
.top{display:flex;justify-content:space-between;align-items:center}
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:12px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;margin-top:12px}
th,td{padding:10px;border-bottom:1px solid #e5e7eb;font-size:14px}
th{background:#f3f4f6;text-align:right}
input,select,button{padding:10px;border-radius:10px;border:1px solid #d1d5db;width:100%;margin-top:8px}
button{background:#111827;color:#fff;border:none;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media (max-width:1100px){.cards{grid-template-columns:repeat(3,1fr)} .grid2{grid-template-columns:1fr}}
</style><link rel="stylesheet" href="../assets/official.css"/>
</head><body>
<div class="wrap">
  <div class="top">
    <h2 style="margin:0">مدير الموقع</h2>
    <button onclick="logout()" style="width:auto">تسجيل خروج</button>
  </div>

  <div class="cards">
    <div class="card"><div style="color:#6b7280">العقارات</div><div id="st_props" style="font-size:20px;font-weight:800">-</div></div>
    <div class="card"><div style="color:#6b7280">الوحدات</div><div id="st_units" style="font-size:20px;font-weight:800">-</div></div>
    <div class="card"><div style="color:#6b7280">الملاك</div><div id="st_owners" style="font-size:20px;font-weight:800">-</div></div>
    <div class="card"><div style="color:#6b7280">مستخدمو الملاك</div><div id="st_staff" style="font-size:20px;font-weight:800">-</div></div>
    <div class="card"><div style="color:#6b7280">المستأجرون</div><div id="st_tenants" style="font-size:20px;font-weight:800">-</div></div>
    <div class="card"><div style="color:#6b7280">إجمالي المستخدمين</div><div id="st_total" style="font-size:20px;font-weight:800">-</div></div>
  </div>

  <div class="grid2">
    <div class="card">
      <h3 style="margin:0 0 8px">المستخدمون (آخر 200)</h3>
      <select id="role" onchange="loadUsers()">
        <option value="">الكل</option>
        <option value="owner">مالك</option>
        <option value="staff">مستخدم</option>
        <option value="tenant">مستأجر</option>
      </select>
      <table>
        <thead><tr><th>الاسم</th><th>الدور</th><th>البريد</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="users"></tbody>
      </table>
    </div>

    <div class="card">
      <h3 style="margin:0 0 8px">إرسال إشعار</h3>
      <select id="tRole">
        <option value="owner">ملاك</option>
        <option value="staff">مستخدمو الملاك</option>
        <option value="tenant">مستأجرون</option>
      </select>
      <input id="ownerScopeId" placeholder="ownerScopeId (اختياري لتقييد الإشعار بمالك معين)"/>
      <input id="targetUserId" placeholder="targetUserId (اختياري لإرسال لمستخدم محدد)"/>
      <input id="title" placeholder="عنوان"/>
      <input id="body" placeholder="المحتوى"/>
      <select id="sendEmail">
        <option value="0">داخل النظام فقط</option>
        <option value="1">داخل النظام + بريد</option>
      </select>
      <button onclick="sendNotif()">إرسال</button>
      <div id="msg" style="margin-top:8px"></div>

      <h3 style="margin:18px 0 8px">تغيير كلمة المرور</h3>
      <input id="oldPw" type="password" placeholder="كلمة المرور الحالية"/>
      <input id="newPw" type="password" placeholder="كلمة المرور الجديدة"/>
      <button onclick="changePw()">تغيير</button>

      <div id="pwMsg" style="margin-top:8px"></div>

      <h3 style="margin:18px 0 8px">إضافة مسؤول نظام (صلاحيات محدودة)</h3>
      <div style="color:#6b7280;font-size:13px">هذه الميزة متاحة لمدير الموقع فقط.</div>
      <input id="a_name" placeholder="اسم المسؤول"/>
      <input id="a_email" placeholder="البريد"/>
      <input id="a_phone" placeholder="الجوال (اختياري)"/>
      <button onclick="addAdminStaff()">إضافة</button>
      <div id="a_msg" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
async function loadStats(){
  const s=await api("/site_admin/stats.php");
  st_props.textContent=s.stats.properties;
  st_units.textContent=s.stats.units;
  st_owners.textContent=s.stats.owners;
  st_staff.textContent=s.stats.staffUsers;
  st_tenants.textContent=s.stats.tenants;
  st_total.textContent=s.stats.totalUsers;
}
async function loadUsers(){
  const q=role.value?("?role="+role.value):"";
  const r=await api("/site_admin/users_list.php"+q);
  users.innerHTML="";
  for(const u of r.items){
    const tr=document.createElement("tr");
    const canToggle = (window.__role === 'site_admin' || window.__role === 'site_admin_staff');
    const btn = (!canToggle || u.role==="site_admin") ? "" : `<button onclick="toggle(${u.id}, '${u.status==='active'?'disabled':'active'}')">${u.status==='active'?'إيقاف':'تفعيل'}</button>`;
    tr.innerHTML=`<td>${u.full_name}</td><td>${u.role}</td><td>${u.email}</td><td>${u.status}</td><td>${btn}</td>`;
    users.appendChild(tr);
  }
}
async function toggle(id, st){
  if(!confirm("تأكيد تغيير الحالة؟")) return;
  await api("/site_admin/user_toggle.php",{method:"POST",body:{userId:id,status:st}});
  await loadUsers();
}

async function changePw(){
  pwMsg.textContent="";
  try{
    await api("/auth/change_password.php",{method:"POST",body:{oldPassword:oldPw.value,newPassword:newPw.value}});
    pwMsg.textContent="✅ تم تغيير كلمة المرور";
    oldPw.value=""; newPw.value="";
  }catch(e){ pwMsg.textContent="❌ "+e.message; }
}

async function addAdminStaff(){
  a_msg.textContent="";
  try{
    if(window.__role !== 'site_admin') throw new Error("هذه الميزة لمدير الموقع فقط");
    const r=await api("/site_admin/admin_create.php",{method:"POST",body:{fullName:a_name.value,email:a_email.value,phone:a_phone.value}});
    a_msg.textContent="✅ تم إضافة مسؤول نظام. رقم: "+r.adminStaffId+" (سيصل بريد بكلمة المرور)";
    a_name.value=""; a_email.value=""; a_phone.value="";
    await loadUsers(); await loadStats();
  }catch(e){ a_msg.textContent="❌ "+e.message; }
}

async function sendNotif(){
  msg.textContent="";
  try{
    const r=await api("/site_admin/notifications_send.php",{method:"POST",body:{
      targetRole:tRole.value,title:title.value,body:body.value,
      targetUserId:Number(targetUserId.value||0),
      ownerScopeId:Number(ownerScopeId.value||0),
      sendEmail:Number(sendEmail.value||0)
    }});
    msg.textContent="✅ تم الإرسال. رقم: "+r.notificationId;
    title.value=""; body.value="";
  }catch(e){ msg.textContent="❌ "+e.message; }
}
async function boot(){
  try{
    const me = await api("/me.php");
    if(!(["site_admin","site_admin_staff"]).includes(me.me.role)) { alert("ليس لديك صلاحية"); logout(); return; }
    window.__role = me.me.role;
 await loadStats(); await loadUsers(); }
  catch(e){ alert(e.message); logout(); }
}
boot();
</script>
</body></html>
