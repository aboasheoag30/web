<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>تغيير كلمة المرور - ايجار ويب</title>
<link rel="stylesheet" href="../assets/official.css"/>
</head><body>
<div class="navbar no-print"><div class="container">
  <div class="brand"><div class="logo">EW</div><div>
    <div class="title">ايجار ويب</div>
    <div class="small">تغيير كلمة المرور</div>
  </div></div>
  <div class="hstack">
    <button class="light" onclick="goBack()">رجوع</button>
    <button class="secondary" onclick="logout()">تسجيل خروج</button>
  </div>
</div></div>

<div class="container">
  <div class="card" style="max-width:520px;margin:auto">
    <h3>تغيير كلمة المرور</h3>
    <div class="small">سيتم تسجيل خروجك تلقائيًا بعد تغيير كلمة المرور.</div>
    <div class="hr"></div>
    <div class="grid" style="gap:10px">
      <input id="oldPw" type="password" placeholder="كلمة المرور الحالية"/>
      <input id="newPw" type="password" placeholder="كلمة المرور الجديدة (8 أحرف على الأقل)"/>
      <input id="newPw2" type="password" placeholder="تأكيد كلمة المرور الجديدة"/>
      <button onclick="submitChange()">حفظ</button>
      <div id="msg" class="small"></div>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
async function goBack(){
  const me = await api("/me.php");
  const role = me.me.role;
  if(role==='owner' || role==='staff') location.href="../owner/panel.html";
  else if(role==='tenant') location.href="../tenant/panel.html";
  else location.href="../site-admin/panel.html";
}
async function submitChange(){
  msg.textContent="";
  if(newPw.value.length<8){ msg.textContent="كلمة المرور الجديدة قصيرة"; return; }
  if(newPw.value!==newPw2.value){ msg.textContent="التأكيد غير مطابق"; return; }
  try{
    await api("/auth/change_password.php", {oldPassword:oldPw.value, newPassword:newPw.value});
    alert("تم تغيير كلمة المرور. سيتم تسجيل خروجك الآن.");
    logout();
  }catch(e){ msg.textContent=e.message; }
}
</script>
</body></html>
